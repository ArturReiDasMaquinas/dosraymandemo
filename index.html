<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayman DOS Demo - Arcade de Preservação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #e0e0e6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle, #1a1a24 0%, #0f0f12 100%);
        }

        .arcade-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #16161a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid #24242b;
            max-width: 850px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.6rem;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }

        .subtitle {
            color: #888893;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Container do Emulador (Proporção clássica 4:3 do DOS) */
        .emulator-wrapper {
            width: 800px;
            height: 600px;
            max-width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #2c2c35;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            position: relative;
        }

        #game {
            width: 100%;
            height: 100%;
        }

        /* Painel de Instruções de Controle */
        .controls-panel {
            margin-top: 20px;
            background-color: #24242b;
            border: 1px solid #2c2c35;
            border-radius: 8px;
            padding: 15px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .controls-panel h3 {
            margin: 0 0 10px 0;
            font-size: 0.95rem;
            color: #a5a5b4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grid-keys {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            font-size: 0.85rem;
        }

        .key-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        kbd {
            background-color: #16161a;
            border: 1px solid #444452;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            color: #ffcc00;
            box-shadow: 0 2px 0 #000;
        }

        .footer-nav {
            margin-top: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888893;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #ff3344;
        }
    </style>
</head>
<body>

    <div class="arcade-container">
        <h1>Rayman (1995)</h1>
        <div class="subtitle">MS-DOS Demo Version Preservation</div>

        <div class="emulator-wrapper">
            <div id="game"></div>
        </div>

        <div class="controls-panel">
            <h3>⌨️ Controles do Teclado</h3>
            <div class="grid-keys">
                <div class="key-item"><kbd>←</kbd> <kbd>→</kbd> <span>Mover Rayman</span></div>
                <div class="key-item"><kbd>Alt</kbd> <span>Pular</span></div>
                <div class="key-item"><kbd>Ctrl</kbd> <span>Socar / Ação</span></div>
                <div class="key-item"><kbd>Espaço</kbd> <span>Fazer Careta (Susto)</span></div>
                <div class="key-item"><kbd>Esc</kbd> <span>Menu / Pausa</span></div>
                <div class="key-item"><kbd>Alt</kbd> + <kbd>Enter</kbd> <span>Tela Cheia</span></div>
            </div>
        </div>

        <div class="footer-nav">
            <button class="back-btn" onclick="window.history.back()">← Voltar para a seleção</button>
        </div>
    </div>

    <script>
        // Define o container onde o emulador vai renderizar
        EJS_player = '#game';
        
        // Define o núcleo do sistema (MS-DOS)
        EJS_core = 'dos';
        
        // Endereço dos arquivos de engine WebAssembly (CDN estável oficial)
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        
        // Caminho para o arquivo ZIP contendo os arquivos do jogo
        EJS_gameUrl = 'rayman_demo.zip'; 
        
        // Inicia o jogo automaticamente assim que terminar de baixar o ZIP
        EJS_startOnLoaded = true;

        // Script de AUTOEXEC para o prompt do DOSBox iniciar o jogo direto
        // Monta o ZIP extraído como drive C:, entra nele e chama o executável
        EJS_dosConfig = "[autoexec]\nmount c .\nc:\nRAYMAN.EXE\n";
    </script>
    
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
