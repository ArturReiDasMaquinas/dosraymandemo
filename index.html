<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayman DOS Demo - Arcade de Preservação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #e0e0e6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle, #1a1a24 0%, #0f0f12 100%);
        }

        .arcade-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #16161a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid #24242b;
            max-width: 850px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.6rem;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }

        .subtitle {
            color: #888893;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Container do Emulador (Proporção clássica 4:3 do DOS) */
        .emulator-wrapper {
            width: 800px;
            height: 600px;
            max-width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #2c2c35;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            position: relative;
        }

        /* FILTRO CRT (Scanlines e Vinheta de Monitor de Tubo) */
        .emulator-wrapper::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                        radial-gradient(circle, rgba(0,0,0,0) 55%, rgba(0,0,0,0.75) 100%);
            background-size: 100% 4px, 100% 100%;
            z-index: 999;
            pointer-events: none;
            opacity: 0.85;
        }

        #game {
            width: 100%;
            height: 100%;
        }

        /* Tela de Capa / Botão de Iniciar Obligatório pelo Navegador */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121214;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        #start-overlay:hover .start-btn {
            background-color: #ffcc00;
            color: #0f0f12;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .start-btn {
            background-color: #24242b;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .start-hint {
            color: #575765;
            font-size: 0.8rem;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="arcade-container">
        <h1>Rayman (1995)</h1>
        <div class="subtitle">MS-DOS Demo Version Preservation</div>

        <div class="emulator-wrapper">
            
            <div id="start-overlay" onclick="iniciarJogo()">
                <button class="start-btn">🕹️ INICIAR DEMO</button>
                <div class="start-hint">Clique para carregar o WebAssembly e liberar o som</div>
            </div>

            <div id="game"></div>
        </div>
    </div>

    <script>
        EJS_player = '#game';
        EJS_core = 'dos';
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_gameUrl = 'rayman_demo.zip'; 
        EJS_startOnLoaded = true;
        EJS_dosConfig = "[autoexec]\nmount c .\nc:\nRAYMAN.EXE\n";

        // Função que injeta o script do emulador apenas APÓS o clique do usuário
        function iniciarJogo() {
            // Esconde a tela de overlay
            document.getElementById('start-overlay').style.display = 'none';
            
            // Cria e injeta o script do EmulatorJS dinamicamente de forma segura
            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(script);
        }
    </script>

</body>
</html>
