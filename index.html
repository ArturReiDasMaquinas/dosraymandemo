<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayman DOS Demo - Arcade de Preservação</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/js-dos/6.22.1/js-dos.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-dos/6.22.1/js-dos.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #e0e0e6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle, #1a1a24 0%, #0f0f12 100%);
        }

        .arcade-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #16161a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid #24242b;
            max-width: 850px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.6rem;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }

        .subtitle {
            color: #888893;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Container do Emulador (Proporção 4:3) */
        .emulator-wrapper {
            width: 800px;
            height: 600px;
            max-width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #2c2c35;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            position: relative;
        }

        /* FILTRO CRT MÁGICO (Scanlines e efeito de Monitor de Tubo) */
        .emulator-wrapper::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
                        radial-gradient(circle, rgba(0,0,0,0) 55%, rgba(0,0,0,0.75) 100%);
            background-size: 100% 4px, 100% 100%;
            z-index: 999;
            pointer-events: none;
            opacity: 0.85;
        }

        #game {
            width: 100%;
            height: 100%;
        }

        /* Oculta as barras nativas poluídas do JS-DOS */
        .jsdos-footer, .jsdos-header, .jsdos-sidebar {
            display: none !important;
        }

        /* Tela de Capa / Botão de Iniciar */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121214;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .start-btn {
            background-color: #24242b;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .start-btn:hover {
            background-color: #ffcc00;
            color: #0f0f12;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .start-hint {
            color: #575765;
            font-size: 0.8rem;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.4;
        }

        /* Animação simples de piscar estilo Arcade */
        .blinking {
            animation: blinker 1.5s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="arcade-container">
        <h1>Rayman (1995)</h1>
        <div class="subtitle">MS-DOS Demo Version Preservation</div>

        <div class="emulator-wrapper">
            <div id="start-overlay">
                <button class="start-btn" id="main-btn" onclick="iniciarJogo()">🕹️ INICIAR DEMO</button>
                <div class="start-hint" id="hint-text">Clique para rodar o emulador DOSBox</div>
            </div>

            <div id="game"></div>
        </div>
    </div>

    <script>
        function iniciarJogo() {
            const btn = document.getElementById('main-btn');
            const hint = document.getElementById('hint-text');
            
            // Muda o layout do botão para indicar o progresso do download
            btn.removeAttribute('onclick');
            btn.style.backgroundColor = '#16161a';
            btn.style.color = '#888893';
            btn.style.border = '2px solid #2c2c35';
            btn.style.cursor = 'default';
            btn.classList.add('blinking');
            btn.innerText = '⏳ CARREGANDO JOGO...';
            hint.innerHTML = 'Baixando "rayman_demo.zip" e compilando WebAssembly.<br>Por favor, aguarde alguns segundos.';

            // Inicializa o motor JS-DOS
            Dos(document.getElementById("game"), {
                wdosboxUrl: "https://cdnjs.cloudflare.com/ajax/libs/js-dos/6.22.1/wdosbox.js"
            }).then(function (runtime) {
                // Executa o zip e caça o executável
                runtime.boot("rayman_demo.zip", ["RAYMAN.EXE"]);
                
                // Remove a tela de aviso após dar tempo do DOSBox iniciar a renderização gráfica
                setTimeout(() => {
                    document.getElementById('start-overlay').style.display = 'none';
                }, 2500);
            }).catch(function(err) {
                btn.classList.remove('blinking');
                btn.style.color = '#ff3333';
                btn.style.border = '2px solid #ff3333';
                btn.innerText = '❌ ERRO AO CARREGAR';
                hint.innerText = 'Verifique se o arquivo rayman_demo.zip está na pasta correta.';
                console.error(err);
            });
        }
    </script>

</body>
</html>
